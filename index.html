        padding: 10px 0;
      }
      .nav-container {
        padding: 0 14px;
      }
      .nav-left {
        gap: 8px;
      }
      .hamburger {
        font-size: 1.5rem;
        padding: 4px 6px;
      }
      .logo {
        font-size: 1.2rem;
        gap: 6px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
      }
      .nav-links-mobile {
        padding: 12px 16px 10px;
        gap: 0.4rem;
      }
      .nav-links-mobile a {
        font-size: 0.85rem;
        padding: 6px 0;
      }
      .nav-links-mobile a i {
        width: 20px;
        font-size: 0.8rem;
      }

      .hero h1 {
        font-size: 1.8rem;
      }
      .hero p {
        font-size: 0.9rem;
      }

      /* Footer fixed at bottom on mobile */
      footer {
        margin-top: 20px;
        padding: 14px 0;
        flex-shrink: 0;
        position: sticky;
        bottom: 0;
      }

      .footer-powered {
        font-size: 0.85rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
      .quality-control {
        padding: 10px 14px;
        gap: 10px;
        border-radius: 12px;
      }
      .quality-control input[type="range"] {
        width: 100px;
      }
      .upload-box {
        padding: 28px 16px;
        min-height: 160px;
      }
      .upload-box i {
        font-size: 2.5rem;
      }
      .upload-box h3 {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding-top: 62px;
      }
      .app-container {
        padding: 0 10px;
      }
      nav {
        padding: 8px 0;
      }
      .nav-container {
        padding: 0 12px;
      }
      .nav-left {
        gap: 6px;
      }
      .hamburger {
        font-size: 1.3rem;
        padding: 3px 5px;
      }
      .logo {
        font-size: 1rem;
        gap: 4px;
      }
      .logo-icon {
        width: 24px;
        height: 24px;
      }
      .hero h1 {
        font-size: 1.4rem;
      }
      .hero p {
        font-size: 0.85rem;
      }
      .btn-square {
        padding: 8px 16px;
        font-size: 0.85rem;
      }
      .upload-box {
        padding: 20px 12px;
        min-height: 140px;
      }
      .upload-box i {
        font-size: 2rem;
      }
      .upload-box h3 {
        font-size: 0.95rem;
      }
      .upload-box p {
        font-size: 0.8rem;
      }
      footer {
        padding: 10px 0;
      }
      .footer-powered {
        font-size: 0.75rem;
      }
    }

    @media (max-width: 360px) {
      .logo {
        font-size: 0.85rem;
        gap: 3px;
      }
      .logo-icon {
        width: 20px;
        height: 20px;
      }
      .hamburger {
        font-size: 1.1rem;
        padding: 2px 4px;
      }
      .nav-container {
        padding: 0 8px;
      }
    }

    @media (min-width: 769px) {
      .nav-left {
        flex: 1;
        justify-content: space-between;
      }
      .hamburger {
        display: block !important;
        font-size: 1.8rem;
        padding: 8px 12px;
      }
      .nav-links-mobile {
        max-width: 300px;
        right: 0;
        left: auto;
        border-radius: 0 0 16px 16px;
      }
      /* Footer not sticky on desktop */
      footer {
        position: relative;
        bottom: auto;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR (from protoolss.online) ===== -->
  <nav id="mainNav">
    <div class="nav-container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <img src="https://i.ibb.co/FkJPMZ8r/Chat-GPT-Image-Jun-18-2026-07-58-22-AM.png" alt="Pro Toolss Logo" class="logo-icon" />
          <span class="pro">Pro</span><span class="toolss">Toolss</span>
        </a>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
      <div class="nav-center" style="display:none !important;"></div>
      <div class="nav-links-mobile" id="navLinksMobile">
        <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN APP ===== -->
  <div class="app-container">
    <!-- HERO SECTION (SMALLER) -->
    <section class="hero">
      <div class="badge"><i class="fas fa-bolt"></i> Free &amp; Offline</div>
      <h1>PNG / JPG / JPEG to WebP</h1>
      <p>Convert your images to WebP format instantly in your browser.</p>
    </section>

    <!-- UPLOAD BOX -->
    <div class="upload-box glass" id="uploadBox">
      <i class="fas fa-cloud-upload-alt"></i>
      <h3>Drop your images here or click to browse</h3>
      <p>Supports PNG, JPG, JPEG — batch upload &amp; convert</p>
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,image/png,image/jpeg" multiple />
    </div>

    <!-- QUALITY + CONVERT ALL -->
    <div class="quality-control glass">
      <label><i class="fas fa-sliders-h"></i> Quality</label>
      <input type="range" id="qualitySlider" min="1" max="100" value="85" />
      <span class="quality-value" id="qualityValue">85%</span>
      <button class="convert-all-btn" id="convertAllBtn"><i class="fas fa-play"></i> Convert All</button>
    </div>

    <!-- GRID -->
    <div class="grid" id="imageGrid"></div>
  </div>

  <!-- ===== FOOTER (from protoolss.online) ===== -->
  <footer>
    <div class="footer-content">
      <div class="footer-powered">
        <i class=""></i> Powered by
        <a href="https://www.protoolss.online" target="_blank" rel="noopener noreferrer">www.protoolss.online</a>
        <i class="" style="color: #ff6b6b;"></i>
      </div>
    </div>
  </footer>

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ============================================================ -->
  <!-- ===== APPLICATION JAVASCRIPT ===== -->
  <script>
    (function() {
      'use strict';

      // ----- NAVBAR (protoolss.online) -----
      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', function() {
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
      });

      const hamburger = document.getElementById('hamburgerBtn');
      const navLinksMobile = document.getElementById('navLinksMobile');
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navLinksMobile.classList.toggle('show');
        const icon = this.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
      });
      document.querySelectorAll('#navLinksMobile a').forEach(link => {
        link.addEventListener('click', function() {
          navLinksMobile.classList.remove('show');
          const icon = hamburger.querySelector('i');
          icon.classList.add('fa-bars');
          icon.classList.remove('fa-times');
        });
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('nav') && navLinksMobile.classList.contains('show')) {
          navLinksMobile.classList.remove('show');
          const icon = hamburger.querySelector('i');
          icon.classList.add('fa-bars');
          icon.classList.remove('fa-times');
        }
      });

      // ----- APP STATE -----
      const grid = document.getElementById('imageGrid');
      const fileInput = document.getElementById('fileInput');
      const uploadBox = document.getElementById('uploadBox');
      const qualitySlider = document.getElementById('qualitySlider');
      const qualityValue = document.getElementById('qualityValue');
      const convertAllBtn = document.getElementById('convertAllBtn');
      const toastContainer = document.getElementById('toastContainer');

      let imageItems = [];
      let idCounter = 0;
      let isConverting = false;

      // ----- TOAST -----
      function showToast(message, type = 'success') {
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        toastContainer.appendChild(el);
        setTimeout(() => { el.style.opacity = '0';
          setTimeout(() => el.remove(), 300); }, 3000);
      }

      // ----- HELPERS -----
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
      }

      function generateWebPName(originalName) {
        return originalName.replace(/\.[^.]+$/, '') + '.webp';
      }

      // ----- CONVERT IMAGE VIA CANVAS -----
      function convertImageToWebP(file, quality) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = img.width;
              canvas.height = img.height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              canvas.toBlob((blob) => {
                if (blob) resolve(blob);
                else reject(new Error('Canvas toBlob failed'));
              }, 'image/webp', quality / 100);
            };
            img.onerror = () => reject(new Error('Failed to decode image'));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error('File read error'));
          reader.readAsDataURL(file);
        });
      }

      // ----- CONVERT SINGLE ITEM -----
      async function convertItem(item, quality) {
        if (item.status === 'done') return;
        item.status = 'converting';
        render();
        try {
          const blob = await convertImageToWebP(item.file, quality);
          if (!blob) throw new Error('Conversion failed');
          const url = URL.createObjectURL(blob);
          if (item.convertedUrl) URL.revokeObjectURL(item.convertedUrl);
          item.convertedBlob = blob;
          item.convertedUrl = url;
          item.status = 'done';
        } catch (err) {
          item.status = 'error';
          showToast(`Error converting ${item.name}: ${err.message}`, 'error');
        }
        render();
        updateConvertAllButton();
      }

      // ----- CONVERT ALL -----
      async function convertAll() {
        if (isConverting) return;
        const pending = imageItems.filter(i => i.status !== 'done' && i.status !== 'converting');
        if (pending.length === 0) {
          showToast('All images are already converted', 'success');
          return;
        }
        isConverting = true;
        convertAllBtn.disabled = true;
        convertAllBtn.innerHTML = '<span class="loading-spinner"></span> Converting...';
        convertAllBtn.classList.add('btn-loading');

        const quality = parseInt(qualitySlider.value, 10);
        for (const item of pending) {
          await convertItem(item, quality);
        }

        isConverting = false;
        convertAllBtn.disabled = false;
        convertAllBtn.classList.remove('btn-loading');
        updateConvertAllButton();
        showToast('Batch conversion complete', 'success');
      }

      // ----- REMOVE ITEM -----
      function removeItem(id) {
        const idx = imageItems.findIndex(i => i.id === id);
        if (idx === -1) return;
        const item = imageItems[idx];
        if (item.originalUrl) URL.revokeObjectURL(item.originalUrl);
        if (item.convertedUrl) URL.revokeObjectURL(item.convertedUrl);
        imageItems.splice(idx, 1);
        render();
        updateConvertAllButton();
        showToast('Image removed', 'success');
      }

      // ----- UPDATE CONVERT ALL BUTTON -----
      function updateConvertAllButton() {
        const pending = imageItems.filter(i => i.status !== 'done' && i.status !== 'converting');
        convertAllBtn.disabled = isConverting || pending.length === 0;
        if (!isConverting) {
          if (pending.length === 0 && imageItems.length > 0) {
            convertAllBtn.innerHTML = '<i class="fas fa-check"></i> All Converted';
          } else {
            convertAllBtn.innerHTML = `<i class="fas fa-play"></i> Convert All (${pending.length})`;
          }
        }
      }

      // ----- HANDLE FILES -----
      function handleFiles(files) {
        const allowed = ['image/png', 'image/jpeg'];
        let added = 0;
        for (const file of files) {
          if (!allowed.includes(file.type)) {
            showToast(`Skipped ${file.name}: unsupported type (${file.type})`, 'error');
            continue;
          }
          if (file.size === 0) {
            showToast(`Skipped ${file.name}: empty file`, 'error');
            continue;
          }
          const url = URL.createObjectURL(file);
          const item = {
            id: ++idCounter,
            file: file,
            originalUrl: url,
            convertedBlob: null,
            convertedUrl: null,
            name: file.name,
            size: file.size,
            width: 0,
            height: 0,
            status: 'idle',
          };
          const img = new Image();
          img.onload = () => {
            item.width = img.width;
            item.height = img.height;
            render();
          };
          img.onerror = () => { /* ignore */ };
          img.src = url;
          imageItems.push(item);
          added++;
        }
        if (added) {
          render();
          updateConvertAllButton();
          showToast(`Added ${added} image(s)`, 'success');
        }
      }

      // ----- RENDER GRID -----
      function render() {
        if (imageItems.length === 0) {
          grid.innerHTML =
            `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#6b7a8f;">No images uploaded yet.</div>`;
          return;
        }
        let html = '';
        for (const item of imageItems) {
          const isConverted = item.status === 'done' && item.convertedUrl;
          const isConverting = item.status === 'converting';
          const originalSize = formatSize(item.size);
          const convertedSize = isConverted ? formatSize(item.convertedBlob.size) : '—';
          const savedPercent = isConverted ? Math.round((1 - item.convertedBlob.size / item.size) * 100) : 0;
          const dims = item.width && item.height ? `${item.width}×${item.height}` : '—';
          html += `
            <div class="card glass" data-id="${item.id}">
              <div class="card-img-wrap">
                <img src="${item.originalUrl}" alt="${item.name}" loading="lazy">
                ${isConverted ? `<img src="${item.convertedUrl}" alt="converted" loading="lazy">` : ''}
                ${isConverting ? '<div style="display:flex; align-items:center; justify-content:center; min-height:80px;"><span class="loading-spinner" style="border-color:rgba(110,59,255,0.2); border-top-color:#6e3bff; width:30px; height:30px;"></span></div>' : ''}
              </div>
              <div class="card-info">
                <div class="name" title="${item.name}">${item.name}</div>
                <div class="size">Original: ${originalSize} &nbsp;|&nbsp; WebP: ${convertedSize}</div>
                <div class="dim">${dims}</div>
                ${isConverted ? `<span class="saved-badge"><i class="fas fa-save"></i> ${savedPercent}% saved</span>` : ''}
                ${isConverting ? '<div class="progress-wrap"><div class="progress-fill" style="width:70%; animation: pulse 1s ease-in-out infinite;"></div></div>' : ''}
              </div>
              <div class="card-actions">
                <button class="download-btn" data-id="${item.id}" ${!isConverted ? 'disabled' : ''}>
                  <i class="fas fa-download"></i> Download
                </button>
                <button class="remove-btn" data-id="${item.id}"><i class="fas fa-times"></i></button>
              </div>
            </div>
          `;
        }
        grid.innerHTML = html;

        grid.querySelectorAll('.download-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = Number(btn.dataset.id);
            const item = imageItems.find(i => i.id === id);
            if (item && item.convertedBlob) {
              const link = document.createElement('a');
              link.href = URL.createObjectURL(item.convertedBlob);
              link.download = generateWebPName(item.name);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              setTimeout(() => URL.revokeObjectURL(link.href), 100);
              showToast(`Downloaded ${generateWebPName(item.name)}`, 'success');
            }
          });
        });

        grid.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = Number(btn.dataset.id);
            removeItem(id);
          });
        });
      }

      // ----- EVENT BINDINGS -----
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
          handleFiles(e.target.files);
          fileInput.value = '';
        }
      });

      uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('drag-over');
      });
      uploadBox.addEventListener('dragleave', () => {
        uploadBox.classList.remove('drag-over');
      });
      uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
          handleFiles(e.dataTransfer.files);
        }
      });

      uploadBox.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') fileInput.click();
      });
      uploadBox.setAttribute('tabindex', '0');
      uploadBox.setAttribute('role', 'button');

      qualitySlider.addEventListener('input', () => {
        qualityValue.textContent = qualitySlider.value + '%';
      });

      convertAllBtn.addEventListener('click', convertAll);

      // ----- INIT -----
      render();
      updateConvertAllButton();

    })();
  </script>

</body>
</html>
